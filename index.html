<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCSR Vlogs</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div class="loader-wrapper">
    <div class="spinner"></div>
  </div>

  <!-- Header Navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-play-circle"></i>UCSR<span> Vlogs</span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="#devotional-section">Devotional</a></li>
        <li><a href="#adventure-section">Adventure</a></li>
        <li><a href="#short-films-section">Short Films</a></li>
        <li><a href="#timepass-section">Timepass</a></li>
      </ul>
    </div>
    <div class="nav-actions">
      <button class="search-btn" aria-label="Search">
        <i class="fas fa-search"></i>
      </button>
      <button class="menu-toggle" aria-label="Menu Toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Cinematic Hero Banner (Most Viewed / Featured) -->
  <section class="hero" id="hero-section">
    <!-- Hydrated dynamically from app.js -->
  </section>

  <!-- Main OTT Sliders Grid -->
  <main class="main-content">
    
    <!-- Newly Uploaded Row -->
    <section class="category-row fade-in-section" id="newly-uploaded-section">
      <!-- Hydrated from app.js -->
    </section>

    <!-- Most Watched Row -->
    <section class="category-row fade-in-section" id="most-watched-section">
      <!-- Hydrated from app.js -->
    </section>

    <!-- Devotional Row -->
    <section class="category-row fade-in-section" id="devotional-section">
      <!-- Hydrated from app.js -->
    </section>

    <!-- Adventure Row -->
    <section class="category-row fade-in-section" id="adventure-section">
      <!-- Hydrated from app.js -->
    </section>

    <!-- Short Films Row -->
    <section class="category-row fade-in-section" id="short-films-section">
      <!-- Hydrated from app.js -->
    </section>

    <!-- Timepass Row -->
    <section class="category-row fade-in-section" id="timepass-section">
      <!-- Hydrated from app.js -->
    </section>



  </main>

  <!-- Live Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-header">
      <div class="search-input-wrapper">
        <input type="text" id="search-input" class="search-input" placeholder="Search by title, category, description..." autocomplete="off">
        <i class="fas fa-search search-icon-inside"></i>
      </div>
      <button class="search-close-btn" id="search-close-btn" aria-label="Close search">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="search-results-title">Search Results</div>
    <div class="search-results-grid" id="search-results-grid">
      <!-- Live filtered card items populate here -->
    </div>
  </div>

  <!-- Footer Section -->
  <footer>
    <div style="text-align: center; max-width: 600px; margin: 0 auto; line-height: 1.8; padding: 10px 0;">
      <p style="font-weight: 700; font-size: 18px; color: var(--text-color); margin-bottom: 8px; letter-spacing: 1px;">UCSR VLOGS &copy;</p>
      <p style="font-style: italic; color: var(--text-muted); margin-bottom: 12px; font-size: 15px;">Spiritual Steps, Adventurous Miles & Creative Frames</p>
      <p style="font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px;">Estd 2005</p>
    </div>
  </footer>

  <!-- Script Modules -->
  <script src="videos.js"></script>
  <script src="newly_uploaded.js"></script>
  <script src="slider.js"></script>
  <script src="search.js"></script>
  <script src="app.js"></script>
</body>
</html>
