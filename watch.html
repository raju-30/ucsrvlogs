<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Vlog - UCSR Vlogs</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="watch.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>

  <!-- Loading Animation Overlay -->
  <div class="loader-wrapper">
    <div class="spinner"></div>
  </div>

  <!-- Header Navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-play-circle"></i>UCSR<span> Vlogs</span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#devotional-section">Devotional</a></li>
        <li><a href="index.html#adventure-section">Adventure</a></li>
        <li><a href="index.html#short-films-section">Short Films</a></li>
        <li><a href="index.html#timepass-section">Timepass</a></li>
      </ul>
    </div>
    <div class="nav-actions">
      <button class="search-btn" aria-label="Search">
        <i class="fas fa-search"></i>
      </button>
      <button class="menu-toggle" aria-label="Menu Toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Watch Page Content Wrapper -->
  <main class="watch-container">
    
    <!-- Back Button -->
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back to Browse
    </a>

    <!-- Main Detail Section -->
    <div class="watch-grid">
      <!-- Player Simulator Container (Hydrated from watch.js) -->
      <div id="player-container">
        <!-- Hydrated dynamically -->
      </div>

      <!-- Description & Information Panel (Hydrated from watch.js) -->
      <div id="details-container">
        <!-- Hydrated dynamically -->
      </div>
    </div>

    <!-- Episode Checklist Block (Visible only for series) -->
    <section class="episodes-section" id="episodes-section" style="display: none;">
      <h3 class="episodes-title"><i class="fas fa-list-ol"></i> Episodes in this Series</h3>
      <div class="episodes-list" id="episodes-list">
        <!-- Hydrated dynamically -->
      </div>
    </section>

    <!-- More Like This Recommendation Section -->
    <section class="recommendations-section" id="more-like-this-section">
      <h3 class="recommendations-title">More Like This</h3>
      <div class="recommendations-grid" id="more-like-this-grid">
        <!-- Hydrated dynamically -->
      </div>
    </section>

    <!-- Watch More (Randomised from other categories) Recommendation Section -->
    <section class="recommendations-section" id="watch-more-section">
      <h3 class="recommendations-title">Watch More</h3>
      <div class="recommendations-grid" id="watch-more-grid">
        <!-- Hydrated dynamically -->
      </div>
    </section>

  </main>

  <!-- Live Search Overlay (Directs searching keywords) -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-header">
      <div class="search-input-wrapper">
        <input type="text" id="search-input" class="search-input" placeholder="Search by title, category, description..." autocomplete="off">
        <i class="fas fa-search search-icon-inside"></i>
      </div>
      <button class="search-close-btn" id="search-close-btn" aria-label="Close search">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="search-results-title">Search Results</div>
    <div class="search-results-grid" id="search-results-grid">
      <!-- Live filtered card items populate here -->
    </div>
  </div>

  <!-- Footer Section -->
  <footer>
    <div style="text-align: center; max-width: 600px; margin: 0 auto; line-height: 1.8; padding: 10px 0;">
      <p style="font-weight: 700; font-size: 18px; color: var(--text-color); margin-bottom: 8px; letter-spacing: 1px;">UCSR VLOGS &copy;</p>
      <p style="font-style: italic; color: var(--text-muted); margin-bottom: 12px; font-size: 15px;">Spiritual Steps, Adventurous Miles & Creative Frames</p>
      <p style="font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px;">Estd 2005</p>
    </div>
  </footer>

  <!-- Script Modules -->
  <script src="videos.js"></script>
  <script src="newly_uploaded.js"></script>
  <script src="search.js"></script>
  <script src="watch.js"></script>
</body>
</html>
